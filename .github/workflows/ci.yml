name: FCDM CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1 ffmpeg

    - name: Fetch FCDM Submodules
      run: bash fetch-submodules.sh --shallow

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install librosa numpy tensorflow onnxruntime pyserial

    - name: Prepare ML Models
      run: python3 scripts/convert_models.py

    - name: Run Integration Tests
      run: |
        PYTHONPATH=. python3 scripts/integration_test.py

    - name: Run Stream Sanitizer Tests
      run: |
        PYTHONPATH=. python3 scripts/test_stream_sanitizer.py

    - name: Run Audio Processor Tests
      run: |
        PYTHONPATH=. python3 scripts/test_audio_processor.py

    - name: Run Music Ingestion End-to-End Test
      run: |
        mkdir -p itgmania/Songs/TestGroup/TestSong
        # Create synthetic 120bpm audio
        python3 -c "import wave, struct, numpy as np; sr=22050; t=np.linspace(0, 5, int(sr*5)); y=np.zeros_like(t); [y.__setitem__(slice(int(i*0.5*sr), int(i*0.5*sr+0.1*sr)), np.sin(2*np.pi*440*t[int(i*0.5*sr):int(i*0.5*sr+0.1*sr)])) for i in range(10)]; f=wave.open('itgmania/Songs/TestGroup/TestSong/test.wav', 'w'); f.setnchannels(1); f.setsampwidth(2); f.setframerate(sr); [f.writeframes(struct.pack('<h', int(s*32767))) for s in y]; f.close()"
        PYTHONPATH=. python3 scripts/ingest_music.py itgmania/Songs/TestGroup/
        # Check if sanitized
        grep "(Fitness)" itgmania/Songs/TestGroup/TestSong/test.ssc
